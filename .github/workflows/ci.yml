name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/server/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/server/coverage
      - uses: codecov/codecov-action@v4
        if: ${{ always() && secrets.CODECOV_TOKEN != '' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/server/coverage/lcov.info
          fail_ci_if_error: false

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test
      - run: npm run build

  deploy-staging:
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - test-frontend
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.RENDER_STAGING_DEPLOY_HOOK_URL != '' }}
    steps:
      - name: Deploy to Render staging
        run: curl --fail --silent --show-error -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}"
      - name: Run staging smoke tests
        if: ${{ secrets.STAGING_SMOKE_URL != '' }}
        env:
          SMOKE_URL: ${{ secrets.STAGING_SMOKE_URL }}
        run: |
          for attempt in $(seq 1 12); do
            if curl --fail --silent --show-error "$SMOKE_URL/api/readyz" > /tmp/readyz.json; then
              cat /tmp/readyz.json
              exit 0
            fi
            echo "staging not ready yet (attempt $attempt)"
            sleep 10
          done
          echo "staging smoke test failed"
          exit 1

  deploy-production:
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - test-frontend
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL != '' }}
    steps:
      - name: Deploy to Render production
        run: curl --fail --silent --show-error -X POST "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}"
      - name: Run production smoke tests
        if: ${{ secrets.PRODUCTION_SMOKE_URL != '' }}
        env:
          SMOKE_URL: ${{ secrets.PRODUCTION_SMOKE_URL }}
        run: |
          for attempt in $(seq 1 18); do
            if curl --fail --silent --show-error "$SMOKE_URL/api/readyz" > /tmp/readyz.json; then
              cat /tmp/readyz.json
              exit 0
            fi
            echo "production not ready yet (attempt $attempt)"
            sleep 10
          done
          echo "production smoke test failed"
          exit 1
